---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-bff
  namespace: bookstore-ns
spec:
  replicas: 2  
  selector:
    matchLabels:
      app: mobile-bff
  template:
    metadata:
      labels:
        app: mobile-bff
    spec:
      containers:
      - name: mobile-bff
        image: serign/mobile-bff:v16
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: CUSTOMER_SERVICE_URL
          value: "http://customer-service:3000"
        - name: BOOK_SERVICE_URL
          value: "http://book-service:3000"
        livenessProbe:
          httpGet:
            path: /status
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-bff
  namespace: bookstore-ns
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: mobile-bff
  ports:
  - port: 80
    targetPort: 80