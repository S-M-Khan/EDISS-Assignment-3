---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-service
  namespace: bookstore-ns
spec:
  replicas: 1  
  selector:
    matchLabels:
      app: crm-service
  template:
    metadata:
      labels:
        app: crm-service
    spec:
      containers:
      - name: crm-service
        image: serign/crm-service:v16
        imagePullPolicy: Always
        env:
        - name: KAFKA_BROKERS
          value: "52.73.13.84:9092,100.51.187.149:9092,52.54.87.18:9092"
        - name: ANDREW_ID
          value: "serignmk"
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: crm-secret
              key: smtp-user
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: crm-secret  
              key: smtp-pass
        
---
apiVersion: v1
kind: Service
metadata:
  name: crm-service
  namespace: bookstore-ns
spec:
  selector:
    app: crm-service
  # ports are added to satisfy Kubernetes since it expects it but no component ever calls CRM, it sits there listening for events
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 80