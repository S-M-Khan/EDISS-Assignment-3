

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: bookstore-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql

  # Customer Microservice
  customer-service:
    build: ./src/customer-service
    container_name: customer-service
    environment:
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    ports:
      - "7000:3000" # Local 7000 maps to Container 3000
    depends_on:
      - db

  # Book Microservice
  book-service:
    build: ./src/book-service
    container_name: book-service
    environment:
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:3000" # Local 8000 maps to Container 3000
    depends_on:
      - db

  # Web BFF
  web-bff:
    build: ./src/web-bff
    container_name: web-bff
    environment:
      - PORT=80
      - CUSTOMER_SERVICE_URL=http://customer-service:3000
      - BOOK_SERVICE_URL=http://book-service:3000
    ports:
      - "6000:80" # Local 6000 maps to Container 80
    depends_on:
      - customer-service
      - book-service

  # Mobile BFF
  mobile-bff:
    build: ./src/mobile-bff
    container_name: mobile-bff
    environment:
      - PORT=80
      - CUSTOMER_SERVICE_URL=http://customer-service:3000
      - BOOK_SERVICE_URL=http://book-service:3000
    ports:
      - "5000:80" # Local 5000 maps to Container 80
    depends_on:
      - customer-service
      - book-service